<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Pokémon Lista</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:monospace;background:#fff;color:#111;max-width:500px;margin:40px auto;padding:0 20px;}
  a{color:#555;font-size:12px;text-decoration:none;}a:hover{color:#000;}
  h1{font-size:15px;margin:16px 0 4px;} .sub{font-size:11px;color:#999;margin-bottom:20px;}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
  input{border:1px solid #ccc;padding:5px 8px;font-family:monospace;font-size:12px;outline:none;width:60px;text-align:center;}
  button{border:1px solid #000;background:#fff;padding:5px 12px;font-family:monospace;font-size:12px;cursor:pointer;}
  button:hover{background:#000;color:#fff;}
  #out{margin-top:20px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;font-size:11px;}
  .pk{text-align:center;border:1px solid #f0f0f0;padding:6px;border-radius:4px;}
  .pk img{width:48px;height:48px;image-rendering:pixelated;}
  .pk .name{font-weight:bold;text-transform:capitalize;font-size:10px;}
  .pk .num{color:#999;font-size:10px;}
  .err{color:red;}
</style>
</head><body>
  <a href="../index.html">← volver</a>
  <h1>Pokémon · Lista</h1>
  <p class="sub">pokeapi.co</p>
  <div class="row">
    <span style="font-size:12px;color:#999;">Cantidad:</span>
    <input id="n" type="number" value="20" min="1" max="1025"/>
    <button onclick="run()">Consultar</button>
  </div>
  <div id="out">cargando...</div>
<script>
  async function run() {
    const n = document.getElementById("n").value||20;
    document.getElementById("out").innerHTML = "cargando...";
    try {
      const data = await fetch(`https://pokeapi.co/api/v2/pokemon?limit=${n}`).then(r=>r.json());
      const details = await Promise.all(data.results.map(p=>fetch(p.url).then(r=>r.json())));
      document.getElementById("out").innerHTML = details.map(p=>`
        <div class="pk">
          <img src="${p.sprites.front_default||""}"/>
          <div class="num">#${String(p.id).padStart(3,"0")}</div>
          <div class="name">${p.name}</div>
        </div>`).join("");
    } catch(e){ document.getElementById("out").innerHTML=`<span class="err">Error: ${e.message}</span>`; }
  }
  run();
</script>
</body></html>
