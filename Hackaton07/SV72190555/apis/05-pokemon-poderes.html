<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Pokémon Poderes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:monospace;background:#fff;color:#111;max-width:500px;margin:40px auto;padding:0 20px;}
  a{color:#555;font-size:12px;text-decoration:none;}a:hover{color:#000;}
  h1{font-size:15px;margin:16px 0 4px;} .sub{font-size:11px;color:#999;margin-bottom:20px;}
  .row{display:flex;gap:8px;margin-bottom:16px;}
  input{border:1px solid #ccc;padding:5px 8px;font-family:monospace;font-size:12px;outline:none;width:160px;}
  input:focus{border-color:#000;}
  button{border:1px solid #000;background:#fff;padding:5px 12px;font-family:monospace;font-size:12px;cursor:pointer;}
  button:hover{background:#000;color:#fff;}
  #out{margin-top:20px;font-size:12px;line-height:2;}
  .err{color:red;}
  .field{display:flex;gap:8px;border-bottom:1px solid #f0f0f0;padding:5px 0;}
  .field span:first-child{color:#999;width:100px;flex-shrink:0;}
  img.sprite{width:80px;height:80px;image-rendering:pixelated;}
  .bar-wrap{flex:1;background:#f0f0f0;height:8px;border-radius:4px;overflow:hidden;align-self:center;}
  .bar{height:8px;background:#111;border-radius:4px;}
</style>
</head><body>
  <a href="../index.html">← volver</a>
  <h1>Pokémon · Poderes</h1>
  <p class="sub">pokeapi.co</p>
  <div class="row">
    <input id="q" value="Rhyhorn" placeholder="nombre"/>
    <button onclick="run()">Consultar</button>
  </div>
  <div id="out"></div>
<script>
  document.getElementById("q").onkeydown = e => e.key==="Enter" && run();
  async function run(){
    const n = document.getElementById("q").value.trim().toLowerCase();
    if(!n) return;
    document.getElementById("out").innerHTML="cargando...";
    try{
      const p = await fetch(`https://pokeapi.co/api/v2/pokemon/${n}`).then(r=>r.json());
      if(p.detail) throw new Error("No encontrado");
      const sprite = p.sprites.other?.["official-artwork"]?.front_default||p.sprites.front_default;
      document.getElementById("out").innerHTML=`
        <img class="sprite" src="${sprite}" style="margin-bottom:10px;"/>
        ${row("Nombre",p.name.charAt(0).toUpperCase()+p.name.slice(1))}
        ${row("Número","#"+String(p.id).padStart(3,"0"))}
        ${row("Tipo",p.types.map(t=>t.type.name).join(", "))}
        ${row("Altura",(p.height/10).toFixed(1)+" m")}
        ${row("Peso",(p.weight/10).toFixed(1)+" kg")}
        ${row("Habilidades",p.abilities.map(a=>a.ability.name).join(", "))}
        <div style="height:8px;"></div>
        ${p.stats.map(s=>`
          <div class="field" style="align-items:center;">
            <span>${s.stat.name}</span>
            <div class="bar-wrap"><div class="bar" style="width:${Math.min(s.base_stat,255)/255*100}%"></div></div>
            <span style="width:28px;text-align:right;">${s.base_stat}</span>
          </div>`).join("")}`;
    } catch(e){ document.getElementById("out").innerHTML=`<span class="err">Error: ${e.message}</span>`; }
  }
  function row(k,v){ return `<div class="field"><span>${k}</span><span>${v}</span></div>`; }
  run();
</script>
</body></html>
