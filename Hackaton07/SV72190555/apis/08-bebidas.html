<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Bebidas</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:monospace;background:#fff;color:#111;max-width:500px;margin:40px auto;padding:0 20px;}
  a{color:#555;font-size:12px;text-decoration:none;}a:hover{color:#000;}
  h1{font-size:15px;margin:16px 0 4px;} .sub{font-size:11px;color:#999;margin-bottom:20px;}
  .row{display:flex;gap:8px;margin-bottom:16px;}
  input{border:1px solid #ccc;padding:5px 8px;font-family:monospace;font-size:12px;outline:none;width:160px;}
  input:focus{border-color:#000;}
  button{border:1px solid #000;background:#fff;padding:5px 12px;font-family:monospace;font-size:12px;cursor:pointer;}
  button:hover{background:#000;color:#fff;}
  #out{margin-top:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;font-size:11px;}
  .card{border:1px solid #f0f0f0;border-radius:4px;overflow:hidden;}
  .card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
  .card .info{padding:6px;}
  .card .name{font-weight:bold;font-size:10px;}
  .card .cat{color:#999;font-size:10px;margin-top:2px;}
  .card .ing{color:#555;font-size:9px;margin-top:3px;}
  .err{color:red;}
</style>
</head><body>
  <a href="../index.html">← volver</a>
  <h1>Bebidas · Cócteles</h1>
  <p class="sub">thecocktaildb.com</p>
  <div class="row">
    <input id="q" value="margarita" placeholder="nombre del cóctel"/>
    <button onclick="run()">Buscar</button>
  </div>
  <div id="out">cargando...</div>
<script>
  document.getElementById("q").onkeydown = e => e.key==="Enter" && run();
  async function run(){
    const q=document.getElementById("q").value.trim();
    if(!q) return;
    document.getElementById("out").innerHTML="cargando...";
    try{
      const d=await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`).then(r=>r.json());
      if(!d.drinks) throw new Error("No se encontraron resultados");
      document.getElementById("out").innerHTML=d.drinks.slice(0,6).map(dr=>{
        const ing=[];
        for(let i=1;i<=6;i++) if(dr[`strIngredient${i}`]) ing.push(dr[`strIngredient${i}`]);
        return `<div class="card">
          <img src="${dr.strDrinkThumb}"/>
          <div class="info">
            <div class="name">${dr.strDrink}</div>
            <div class="cat">${dr.strCategory} · ${dr.strAlcoholic}</div>
            <div class="ing">${ing.join(", ")}</div>
          </div>
        </div>`;}).join("");
    } catch(e){ document.getElementById("out").innerHTML=`<span class="err">Error: ${e.message}</span>`; }
  }
  run();
</script>
</body></html>
