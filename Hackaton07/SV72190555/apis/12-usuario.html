<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Usuario Ficticio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:monospace;background:#fff;color:#111;max-width:500px;margin:40px auto;padding:0 20px;}
  a{color:#555;font-size:12px;text-decoration:none;}a:hover{color:#000;}
  h1{font-size:15px;margin:16px 0 4px;} .sub{font-size:11px;color:#999;margin-bottom:20px;}
  button{border:1px solid #000;background:#fff;padding:5px 12px;font-family:monospace;font-size:12px;cursor:pointer;margin-bottom:16px;}
  button:hover{background:#000;color:#fff;}
  #out{margin-top:8px;font-size:12px;line-height:2;}
  .field{display:flex;gap:8px;border-bottom:1px solid #f0f0f0;padding:5px 0;}
  .field span:first-child{color:#999;width:90px;flex-shrink:0;}
  img.avatar{width:64px;height:64px;border-radius:50%;display:block;margin-bottom:12px;}
  .err{color:red;}
</style>
</head><body>
  <a href="../index.html">← volver</a>
  <h1>Usuario ficticio · RandomUser</h1>
  <p class="sub">randomuser.me</p>
  <button onclick="run()">Generar</button>
  <div id="out">cargando...</div>
<script>
  async function run(){
    document.getElementById("out").innerHTML="cargando...";
    try{
      const d=await fetch("https://randomuser.me/api/").then(r=>r.json());
      const u=d.results[0];
      document.getElementById("out").innerHTML=`
        <img class="avatar" src="${u.picture.large}"/>
        ${row("Nombre",`${u.name.first} ${u.name.last}`)}
        ${row("Usuario","@"+u.login.username)}
        ${row("Email",u.email)}
        ${row("Teléfono",u.phone)}
        ${row("País",`${u.location.city}, ${u.location.country}`)}
        ${row("Edad",u.dob.age+" años")}
        ${row("Contraseña",u.login.password)}`;
    } catch(e){ document.getElementById("out").innerHTML=`<span class="err">Error: ${e.message}</span>`; }
  }
  function row(k,v){ return `<div class="field"><span>${k}</span><span>${v}</span></div>`; }
  run();
</script>
</body></html>
