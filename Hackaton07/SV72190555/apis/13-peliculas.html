<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Películas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body   { font-family: monospace; max-width: 560px; margin: 40px auto; padding: 0 20px; }
    a      { color: #555; font-size: 12px; text-decoration: none; cursor: pointer; }
    a:hover { color: #000; }
    h1     { font-size: 15px; margin: 16px 0 4px; }
    .sub   { font-size: 11px; color: #999; margin-bottom: 12px; }
    .cats  { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .cats button { border: 1px solid #ccc; background: #fff; padding: 3px 10px; font-family: monospace; font-size: 11px; cursor: pointer; }
    .cats button.active, .cats button:hover { border-color: #000; background: #000; color: #fff; }
    /* --- VISTA LISTA --- */
    #vista-lista #out { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; font-size: 11px; }
    .card  { border: 1px solid #f0f0f0; border-radius: 3px; overflow: hidden; cursor: pointer; }
    .card:hover { border-color: #999; }
    .card img   { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #f5f5f5; }
    .card .info { padding: 5px; }
    .card .title  { font-weight: bold; font-size: 10px; line-height: 1.3;
                    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card .rating { color: #999; font-size: 9px; margin-top: 2px; }
    /* --- VISTA DETALLE --- */
    #vista-detalle { display: none; }
    .field { display: flex; gap: 8px; border-bottom: 1px solid #f0f0f0; padding: 5px 0; font-size: 12px; line-height: 2; }
    .field span:first-child { color: #999; width: 90px; flex-shrink: 0; }
    .field span:last-child  { line-height: 1.5; }
    img.poster { width: 80px; border-radius: 3px; float: right; margin: 0 0 8px 12px; }
    .err { color: red; font-size: 12px; }
  </style>
</head>
<body>

  <a href="../index.html">← volver</a>

  <!-- ======== VISTA LISTA ======== -->
  <div id="vista-lista">
    <h1>Películas · Top</h1>
    <p class="sub">api.themoviedb.org</p>

    <div class="cats">
      <button class="active" onclick="cargarLista('now_playing', this)">En cartelera</button>
      <button onclick="cargarLista('popular',     this)">Populares</button>
      <button onclick="cargarLista('top_rated',   this)">Mejor valoradas</button>
      <button onclick="cargarLista('upcoming',    this)">Próximos</button>
    </div>

    <div id="out">cargando...</div>
  </div>

  <!-- ======== VISTA DETALLE ======== -->
  <div id="vista-detalle">
   <a onclick="mostrarLista()">← lista</a>
    <h1 style="margin-top:16px;">Películas · Detalle</h1>
    <p class="sub">api.themoviedb.org</p>
    <div id="detalle">cargando...</div>
  </div>

  <script>

    const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIwMDUwY2NkYTY3MDg4NWU3YTZlYzQyMTJjODYxYzRkZSIsIm5iZiI6MTc3Mjk1NTg0OS41MDQ5OTk5LCJzdWIiOiI2OWFkMjhjOWUwOWUzN2FlY2VkZDI3NzIiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.4_fHFOh-UWFNIL10wdZL8FYDNlGnKpRPf13WURZLeJE";
    const IMG   = "https://image.tmdb.org/t/p/w342";
    const HDR   = { Authorization: `Bearer ${TOKEN}` };

    function mostrarLista() {
      document.getElementById("vista-lista").style.display  = "block";
      document.getElementById("vista-detalle").style.display = "none";
    }

    
    function mostrarDetalle() {
      document.getElementById("vista-lista").style.display  = "none";
      document.getElementById("vista-detalle").style.display = "block";
    }


    async function cargarLista(cat, btn) {
      // Marcar el botón de categoría como activo
      document.querySelectorAll(".cats button").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");

      document.getElementById("out").innerHTML = "cargando...";

      try {
        const d = await fetch(
          `https://api.themoviedb.org/3/movie/${cat}?language=es-MX`,
          { headers: HDR }
        ).then(r => r.json());

        if (d.status_message) throw new Error(d.status_message);

        // Al hacer click en una tarjeta llamamos a cargarDetalle(id) — no navegamos a otro archivo
        document.getElementById("out").innerHTML = d.results.slice(0, 12).map(m => `
          <div class="card" onclick="cargarDetalle(${m.id})">
            <img src="${m.poster_path ? IMG + m.poster_path : ""}" onerror="this.style.display='none'"/>
            <div class="info">
              <div class="title">${m.title}</div>
              <div class="rating">★ ${m.vote_average?.toFixed(1)}</div>
            </div>
          </div>
        `).join("");

      } catch (e) {
        document.getElementById("out").innerHTML = `<span class="err">Error: ${e.message}</span>`;
      }
    }

    // --- Vista Detalle ---

    async function cargarDetalle(id) {
      // Primero cambiamos a la vista de detalle y mostramos "cargando..."
      mostrarDetalle();
      document.getElementById("detalle").innerHTML = "cargando...";

      try {
        // Dos consultas en paralelo: datos generales + créditos
        const [movie, credits] = await Promise.all([
          fetch(`https://api.themoviedb.org/3/movie/${id}?language=es-MX`, { headers: HDR }).then(r => r.json()),
          fetch(`https://api.themoviedb.org/3/movie/${id}/credits`,         { headers: HDR }).then(r => r.json()),
        ]);

        if (movie.status_message) throw new Error(movie.status_message);

        const director = credits.crew?.find(c => c.job === "Director")?.name || "—";
        const reparto  = credits.cast?.slice(0, 4).map(a => a.name).join(", ") || "—";
        const generos  = movie.genres?.map(g => g.name).join(", ") || "—";

        document.getElementById("detalle").innerHTML = `
          ${movie.poster_path ? `<img class="poster" src="${IMG + movie.poster_path}"/>` : ""}
          ${row("Título",   movie.title)}
          ${row("Año",      movie.release_date?.slice(0, 4) || "—")}
          ${row("Duración", (movie.runtime || "—") + " min")}
          ${row("Rating",   `★ ${movie.vote_average?.toFixed(1)} (${movie.vote_count?.toLocaleString()} votos)`)}
          ${row("Director", director)}
          ${row("Reparto",  reparto)}
          ${row("Géneros",  generos)}
          <div class="field" style="align-items:flex-start;">
            <span>Sinopsis</span>
            <span style="flex:1; line-height:1.5;">${movie.overview || "Sin sinopsis"}</span>
          </div>
        `;

      } catch (e) {
        document.getElementById("detalle").innerHTML = `<span class="err">Error: ${e.message}</span>`;
      }
    }

    function row(k, v) {
      return `<div class="field"><span>${k}</span><span>${v}</span></div>`;
    }

    // Cargamos la lista al abrir la página
    cargarLista("now_playing");

  </script>
</body>
</html>
